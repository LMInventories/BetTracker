name: bettracker
description: Football betting stats tracker with live notifications
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <5.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3
  flutter_local_notifications: ^17.2.2
  workmanager: ">=0.5.2 <2.0.0"
  shared_preferences: ^2.2.3
  go_router: ^13.2.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
