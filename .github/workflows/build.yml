name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Scaffold Android boilerplate
        run: |
          flutter create --project-name bettracker --org com.bettracker --platforms android . 2>/dev/null || true

      - name: Restore custom AndroidManifest
        run: |
          cp -f android_manifest_override/AndroidManifest.xml \
            android/app/src/main/AndroidManifest.xml

      - name: Pin Kotlin 2.1.0 and apply stdlib resolution
        run: |
          # Old-style projects (pre-3.19): kotlin_version in buildscript block of build.gradle
          sed -i "s/ext\.kotlin_version = '[^']*'/ext.kotlin_version = '2.1.0'/" \
            android/build.gradle 2>/dev/null || true

          # Plugin DSL projects (Flutter 3.19+): version string in settings.gradle plugins block
          # Do NOT replace build.gradle wholesale — that conflicts with the Plugin DSL loader.
          sed -i \
            's/"org\.jetbrains\.kotlin\.android" version "[^"]*"/"org.jetbrains.kotlin.android" version "2.1.0"/g' \
            android/settings.gradle 2>/dev/null || true

          # Append stdlib duplicate-class resolution (safe to append to either project style)
          cat android_gradle_override/stdlib_resolution.gradle >> android/build.gradle

          # Diagnostic: show what Gradle will actually use
          echo "=== build.gradle (kotlin lines) ==="
          grep -i kotlin android/build.gradle | head -10 || echo "(none)"
          echo "=== settings.gradle (kotlin lines) ==="
          grep -i kotlin android/settings.gradle 2>/dev/null | head -10 || echo "(none)"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        run: flutter build apk --release --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bettracker-${{ github.run_number }}-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
