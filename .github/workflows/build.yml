name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Scaffold Android boilerplate
        run: |
          flutter create --project-name bettracker --org com.bettracker --platforms android . 2>/dev/null || true

      - name: Restore custom AndroidManifest
        run: |
          cp -f android_manifest_override/AndroidManifest.xml \
            android/app/src/main/AndroidManifest.xml

      - name: Apply Gradle overrides and pin Kotlin version
        run: |
          # Override project-level build.gradle (old-style buildscript block)
          cp -f android_gradle_override/build.gradle android/build.gradle

          # Flutter 3.19+ uses Plugin DSL — Kotlin version lives in settings.gradle,
          # not build.gradle. Patch both so we're covered regardless of project style.
          sed -i \
            's/"org\.jetbrains\.kotlin\.android" version "[^"]*"/"org.jetbrains.kotlin.android" version "2.1.0"/g' \
            android/settings.gradle 2>/dev/null || true

          # Diagnostic: confirm the versions that will actually be used
          echo "--- build.gradle kotlin_version ---"
          grep -E "kotlin_version|kotlin\.android" android/build.gradle || echo "(not found)"
          echo "--- settings.gradle kotlin version ---"
          grep -E "kotlin" android/settings.gradle 2>/dev/null || echo "(settings.gradle not present or no kotlin entry)"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        run: flutter build apk --release --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bettracker-${{ github.run_number }}-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
