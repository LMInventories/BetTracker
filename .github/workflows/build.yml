name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Scaffold Android boilerplate
        run: |
          flutter create --project-name bettracker --org com.bettracker --platforms android . 2>/dev/null || true

      - name: Restore custom AndroidManifest
        run: |
          cp -f android_manifest_override/AndroidManifest.xml \
            android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bettracker-${{ github.run_number }}-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
