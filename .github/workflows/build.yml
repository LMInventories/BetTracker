name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Use latest stable Flutter — 3.22.0 bundled Kotlin 1.9.22 inside its own
      # Gradle plugin (not patchable from settings.gradle/build.gradle), which is
      # incompatible with plugin versions that now require Kotlin 2.x.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Show Flutter version
        run: flutter --version

      # Run flutter create in a temp directory — running it in the existing repo
      # directory (which already has pubspec.yaml and lib/) causes it to silently
      # skip generating the android/ platform directory.
      - name: Scaffold Android boilerplate
        run: |
          flutter create \
            --project-name bettracker \
            --org com.bettracker \
            --platforms android \
            /tmp/scaffold
          cp -r /tmp/scaffold/android ./android

      - name: Show generated Gradle files
        run: |
          echo "=== Gradle files ==="
          find android \( -name "*.gradle" -o -name "*.gradle.kts" -o -name "*.properties" \) | sort
          echo "=== settings.gradle ==="
          cat android/settings.gradle 2>/dev/null || echo "(not found)"
          echo "=== settings.gradle.kts ==="
          cat android/settings.gradle.kts 2>/dev/null || echo "(not found)"
          echo "=== build.gradle ==="
          cat android/build.gradle 2>/dev/null || echo "(not found)"
          echo "=== build.gradle.kts ==="
          cat android/build.gradle.kts 2>/dev/null || echo "(not found)"
          echo "=== app/build.gradle ==="
          cat android/app/build.gradle 2>/dev/null || echo "(not found)"
          echo "=== app/build.gradle.kts ==="
          cat android/app/build.gradle.kts 2>/dev/null || echo "(not found)"

      - name: Restore custom AndroidManifest
        run: |
          cp -f android_manifest_override/AndroidManifest.xml \
            android/app/src/main/AndroidManifest.xml

      - name: Patch app build file
        run: |
          # Append desugaring + Java 11 + minSdk 21 to the generated app build file.
          # Multiple android{} blocks merge in Gradle; later values override earlier.
          if [ -f android/app/build.gradle.kts ]; then
            cat android_app_override/app_build_patch.gradle.kts >> android/app/build.gradle.kts
            echo "Patched android/app/build.gradle.kts"
            echo "=== app/build.gradle.kts (tail) ==="
            tail -30 android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            cat android_app_override/app_build_patch.gradle >> android/app/build.gradle
            echo "Patched android/app/build.gradle"
            echo "=== app/build.gradle (tail) ==="
            tail -30 android/app/build.gradle
          else
            echo "ERROR: no app build file found" && exit 1
          fi

      - name: Apply root build patches
        run: |
          # Append stdlib conflict resolution + allprojects jvmTarget=11 override.
          # Handles both Groovy DSL (build.gradle) and Kotlin DSL (build.gradle.kts).
          if [ -f android/build.gradle ]; then
            cat android_gradle_override/stdlib_resolution.gradle >> android/build.gradle
            echo "Patched android/build.gradle (Groovy DSL)"
          elif [ -f android/build.gradle.kts ]; then
            cat android_gradle_override/stdlib_resolution.gradle.kts >> android/build.gradle.kts
            echo "Patched android/build.gradle.kts (Kotlin DSL)"
          else
            echo "WARNING: no root android/build.gradle(.kts) found — skipping root patch"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Patch workmanager V1 embedding references
        # workmanager <=0.5.2 references Flutter V1 embedding shim classes
        # (ShimPluginRegistry, PluginRegistrantCallback, Registrar) that were removed
        # from Flutter stable. These code paths are dead in V2 apps — remove them so
        # the K2 compiler can resolve all symbols. A newer compatible version is used
        # automatically if available; this patch is a no-op if the file doesn't match.
        run: |
          python3 - << 'PYEOF'
          import re, glob, os, sys

          dirs = glob.glob('/home/runner/.pub-cache/hosted/pub.dev/workmanager-*/android/src/main/kotlin/dev/fluttercommunity/workmanager')
          if not dirs:
              print("workmanager source not found — skipping patch")
              sys.exit(0)

          wm_dir = sorted(dirs)[-1]
          print(f"Patching workmanager at: {wm_dir}")

          def remove_method_block(text, signature):
              """Remove a method block (and any preceding annotations) by brace counting."""
              lines = text.split('\n')
              result = []
              i = 0
              while i < len(lines):
                  line = lines[i]
                  if signature in line:
                      # Remove immediately preceding annotation lines (@JvmStatic etc.)
                      while result and result[-1].strip().startswith('@'):
                          result.pop()
                      # Skip the method body via brace depth tracking
                      depth = line.count('{') - line.count('}')
                      i += 1
                      while i < len(lines) and depth > 0:
                          depth += lines[i].count('{') - lines[i].count('}')
                          i += 1
                  else:
                      result.append(line)
                      i += 1
              return '\n'.join(result)

          # --- BackgroundWorker.kt ---
          # Errors: line 14 (shim import), line 98 (ShimPluginRegistry.registerWith)
          bw = os.path.join(wm_dir, 'BackgroundWorker.kt')
          if os.path.exists(bw):
              text = open(bw).read()
              orig = text
              text = re.sub(r'import io\.flutter\.embedding\.engine\.plugins\.shim[^\n]*\n', '', text)
              text = re.sub(r'[ \t]*[^\n]*ShimPluginRegistry[^\n]*\n', '', text)
              if text != orig:
                  open(bw, 'w').write(text)
                  print("  patched BackgroundWorker.kt")

          # --- WorkmanagerPlugin.kt ---
          # Errors: lines 35,49 (PluginRegistrantCallback), lines 38-41 (registerWith/Registrar)
          wp = os.path.join(wm_dir, 'WorkmanagerPlugin.kt')
          if os.path.exists(wp):
              text = open(wp).read()
              orig = text
              # Remove PluginRegistrantCallback property/setter declarations
              text = re.sub(r'[ \t]*[^\n]*PluginRegistrantCallback[^\n]*\n', '', text)
              # Remove the V1 registerWith(Registrar) method block
              text = remove_method_block(text, 'fun registerWith(')
              if text != orig:
                  open(wp, 'w').write(text)
                  print("  patched WorkmanagerPlugin.kt")

          print("Patch complete")
          PYEOF

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        run: |
          set -o pipefail
          flutter build apk --release 2>&1 | tee /tmp/flutter_build.log

      - name: Show Kotlin errors (on failure)
        if: failure()
        run: |
          echo "=== Kotlin/Java compiler errors ==="
          grep -E "^e: |error: |Error " /tmp/flutter_build.log | head -100 || echo "(no lines matched — check full log above)"
          echo ""
          echo "=== Last 150 lines of build log ==="
          tail -150 /tmp/flutter_build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bettracker-${{ github.run_number }}-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
